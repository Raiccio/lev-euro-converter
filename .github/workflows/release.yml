name: Build and Release

on:
  release:
    types: [created]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyinstaller python-docx

      - name: Build Windows exe
        run: |
          pip install pyinstaller python-docx
          pyinstaller --onefile --windowed main.py
          mv dist/main.exe dist/lev-euro-converter-win64.exe

      - name: Build Linux binary
        run: |
          pyinstaller --onefile main.py
          mv dist/main dist/lev-euro-converter-linux
          chmod +x dist/lev-euro-converter-linux

      - name: Calculate checksums
        run: |
          cd dist
          sha256sum lev-euro-converter-win64.exe > SHA256SUMS.txt
          sha256sum lev-euro-converter-linux >> SHA256SUMS.txt
          md5sum lev-euro-converter-win64.exe > MD5SUMS.txt
          md5sum lev-euro-converter-linux >> MD5SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/lev-euro-converter-win64.exe
            dist/lev-euro-converter-linux
            dist/SHA256SUMS.txt
            dist/MD5SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}