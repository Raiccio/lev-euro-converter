\name: Build and Release

on:
  release:
    types: [published]

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyinstaller python-docx

      - name: Build Windows exe
        shell: pwsh
        run: |
          pyinstaller --onefile --windowed main.py
          $version = "${{ github.ref_name }}".TrimStart("v")
          Move-Item dist/main.exe "lev-euro-converter-$version-win64.exe"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          body: "lev-euro-converter - Bulgarian BGN to EUR converter for DOCX files"
          files: |
            lev-euro-converter-${{ trimprefix(github.ref_name, 'v') }}-win64.exe

  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyinstaller python-docx

      - name: Build Linux binary
        run: |
          pyinstaller --onefile main.py
          version=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          mv dist/main "lev-euro-converter-$version-linux"
          chmod +x "lev-euro-converter-$version-linux"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          body: "lev-euro-converter - Bulgarian BGN to EUR converter for DOCX files"
          files: |
            lev-euro-converter-${{ trimprefix(github.ref_name, 'v') }}-linux
