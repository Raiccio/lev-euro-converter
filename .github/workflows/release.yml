name: Build and Release

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            ext: .exe
            name: lev-euro-converter-win64.exe
          - os: ubuntu-latest
            ext: ""
            name: lev-euro-converter-linux
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyinstaller python-docx

      - name: Build on Windows
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --onefile --windowed main.py
          mv dist/main.exe ${{ matrix.name }}

      - name: Build on Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          pyinstaller --onefile main.py
          mv dist/main ${{ matrix.name }}
          chmod +x ${{ matrix.name }}

      - name: Calculate SHA256
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            powershell -Command "(Get-FileHash -Path '${{ matrix.name }}' -Algorithm SHA256).Hash" > SHA256.txt
          else
            sha256sum ${{ matrix.name }} > SHA256.txt
          fi
          cat SHA256.txt

      - name: Calculate MD5
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            powershell -Command "(Get-FileHash -Path '${{ matrix.name }}' -Algorithm MD5).Hash" > MD5.txt
          else
            md5sum ${{ matrix.name }} > MD5.txt
          fi

      - name: Get Release Info
        id: release
        run: |
          echo "upload_url=${{ github.event.release.upload_url }}" >> $GITHUB_OUTPUT

      - name: Upload Binary
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.release.outputs.upload_url }}
          asset_path: ${{ matrix.name }}
          asset_name: ${{ matrix.name }}
          asset_content_type: application/octet-stream

      - name: Upload SHA256
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.release.outputs.upload_url }}
          asset_path: SHA256.txt
          asset_name: SHA256-${{ matrix.name }}.txt
          asset_content_type: text/plain

      - name: Upload MD5
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.release.outputs.upload_url }}
          asset_path: MD5.txt
          asset_name: MD5-${{ matrix.name }}.txt
          asset_content_type: text/plain