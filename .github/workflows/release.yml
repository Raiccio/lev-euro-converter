name: Build and Release

on:
  release:
    types: [published]

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyinstaller python-docx

      - name: Build Windows exe
        shell: pwsh
        run: |
          pyinstaller --onefile --windowed main.py
          Move-Item dist/main.exe lev-euro-converter-win64.exe

      - name: Calculate checksums
        shell: pwsh
        run: |
          (Get-FileHash lev-euro-converter-win64.exe -Algorithm SHA256).Hash | Out-File -FilePath SHA256.txt -Encoding UTF8
          (Get-FileHash lev-euro-converter-win64.exe -Algorithm MD5).Hash | Out-File -FilePath MD5.txt -Encoding UTF8
          Get-Content SHA256.txt

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: lev-euro-converter-win64.exe
          asset_name: lev-euro-converter-win64.exe
          asset_content_type: application/octet-stream

      - name: Upload SHA256
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: SHA256.txt
          asset_name: SHA256-lev-euro-converter-win64.exe.txt
          asset_content_type: text/plain

      - name: Upload MD5
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: MD5.txt
          asset_name: MD5-lev-euro-converter-win64.exe.txt
          asset_content_type: text/plain

  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyinstaller python-docx

      - name: Build Linux binary
        run: |
          pyinstaller --onefile main.py
          mv dist/main lev-euro-converter-linux
          chmod +x lev-euro-converter-linux

      - name: Calculate checksums
        run: |
          sha256sum lev-euro-converter-linux > SHA256.txt
          md5sum lev-euro-converter-linux > MD5.txt
          cat SHA256.txt

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: lev-euro-converter-linux
          asset_name: lev-euro-converter-linux
          asset_content_type: application/octet-stream

      - name: Upload SHA256
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: SHA256.txt
          asset_name: SHA256-lev-euro-converter-linux.txt
          asset_content_type: text/plain

      - name: Upload MD5
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: MD5.txt
          asset_name: MD5-lev-euro-converter-linux.txt
          asset_content_type: text/plain
