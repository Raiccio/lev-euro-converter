name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Windows exe
        run: |
          GOOS=windows GOARCH=amd64 go build -o lev-euro-converter.exe

      - name: Build Linux binary
        run: |
          GOOS=linux GOARCH=amd64 go build -o lev-euro-converter

      - name: Build macOS binary
        run: |
          GOOS=darwin GOARCH=amd64 go build -o lev-euro-converter-macos

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            lev-euro-converter.exe
            lev-euro-converter
            lev-euro-converter-macos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}