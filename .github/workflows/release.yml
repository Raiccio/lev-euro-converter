name: Build and Release

on:
  release:
    types: [created]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyinstaller python-docx

      - name: Build Windows exe
        run: |
          pip install pyinstaller python-docx
          pyinstaller --onefile --windowed main.py
          mv dist/main.exe lev-euro-converter-win64.exe
          ls -la lev-euro-converter-win64.exe

      - name: Build Linux binary
        run: |
          pyinstaller --onefile main.py
          mv dist/main lev-euro-converter-linux
          chmod +x lev-euro-converter-linux
          ls -la lev-euro-converter-linux

      - name: Calculate checksums
        run: |
          echo "lev-euro-converter-win64.exe:" > SHA256SUMS.txt
          sha256sum lev-euro-converter-win64.exe >> SHA256SUMS.txt
          echo "" >> SHA256SUMS.txt
          echo "lev-euro-converter-linux:" >> SHA256SUMS.txt
          sha256sum lev-euro-converter-linux >> SHA256SUMS.txt
          
          echo "lev-euro-converter-win64.exe:" > MD5SUMS.txt
          md5sum lev-euro-converter-win64.exe >> MD5SUMS.txt
          echo "" >> MD5SUMS.txt
          echo "lev-euro-converter-linux:" >> MD5SUMS.txt
          md5sum lev-euro-converter-linux >> MD5SUMS.txt
          
          cat SHA256SUMS.txt

      - name: Get Release Info
        id: release
        run: |
          echo "upload_url=${{ github.event.release.upload_url }}" >> $GITHUB_OUTPUT

      - name: Upload Windows exe
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.release.outputs.upload_url }}
          asset_path: lev-euro-converter-win64.exe
          asset_name: lev-euro-converter-win64.exe
          asset_content_type: application/octet-stream

      - name: Upload Linux binary
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.release.outputs.upload_url }}
          asset_path: lev-euro-converter-linux
          asset_name: lev-euro-converter-linux
          asset_content_type: application/octet-stream

      - name: Upload SHA256SUMS
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.release.outputs.upload_url }}
          asset_path: SHA256SUMS.txt
          asset_name: SHA256SUMS.txt
          asset_content_type: text/plain

      - name: Upload MD5SUMS
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.release.outputs.upload_url }}
          asset_path: MD5SUMS.txt
          asset_name: MD5SUMS.txt
          asset_content_type: text/plain