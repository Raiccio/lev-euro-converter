name: Build and Release

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: lev-euro-converter-win64.exe
            exe_name: main.exe
          - os: ubuntu-latest
            artifact_name: lev-euro-converter-linux
            exe_name: main

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller python-docx

      - name: Build on Windows
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --onefile --windowed main.py
          mv dist/${{ matrix.exe_name }} dist/${{ matrix.artifact_name }}

      - name: Build on Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          pyinstaller --onefile main.py
          mv dist/${{ matrix.exe_name }} dist/${{ matrix.artifact_name }}

      - name: Upload artifact (no archive)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          format: file

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: .
          merge-multiple: false

      - name: Calculate checksums
        run: |
          sha256sum lev-euro-converter-win64.exe > SHA256SUMS.txt
          sha256sum lev-euro-converter-linux >> SHA256SUMS.txt
          md5sum lev-euro-converter-win64.exe > MD5SUMS.txt
          md5sum lev-euro-converter-linux >> MD5SUMS.txt
          cat SHA256SUMS.txt
          echo "---"
          cat MD5SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            lev-euro-converter-win64.exe
            lev-euro-converter-linux
            SHA256SUMS.txt
            MD5SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}